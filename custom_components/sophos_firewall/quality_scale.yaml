rules:
  # ── Bronze ────────────────────────────────────────────────────────────────
  action-setup:
    status: exempt
    comment: >
      Integration does not register custom actions (services). All control is
      via entity platforms (switch, button).
  appropriate-polling:
    status: done
    comment: >
      5-tier coordinator: 30 s realtime, 2 min fast, 10 min operative,
      30 min static, once-only. Intervals are user-configurable via Options Flow.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: done
    comment: >
      test_config_flow.py covers all steps (user, snmp, write_access, polling),
      both success and error paths, and all special flows (reauth_confirm,
      reconfigure) including wrong-password and cannot-connect cases.
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not expose custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Integration is polling-based; no push/event entity setup.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-setup: done
  unique-config-entry: done

  # ── Silver ────────────────────────────────────────────────────────────────
  action-exceptions:
    status: exempt
    comment: No custom actions registered.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: done
    comment: >
      test_config_flow.py (19 tests), test_coordinator.py (19 tests),
      test_entities.py (45 tests), test_sophos_client.py (12 tests),
      test_snmp_client.py (24 tests). All platforms and error paths covered.

  # ── Gold ──────────────────────────────────────────────────────────────────
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: >
      Sophos Firewall is a manually configured local appliance. It does not
      advertise itself via mDNS, SSDP, DHCP, or any other discovery mechanism
      supported by Home Assistant.
  discovery-update-info:
    status: exempt
    comment: See discovery exemption above.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: >
      All provided entities are meaningful for typical firewall monitoring use
      cases. Hardware-only sensors (temperature, fans) are gated by VM
      detection and never created on virtual appliances.
  entity-translations: done
  exception-translations:
    status: done
    comment: >
      ConfigEntryNotReady, ConfigEntryAuthFailed, and UpdateFailed all use
      translation_domain=DOMAIN and translation_key with corresponding entries
      in strings.json / translations/*.json under the "exceptions" key.
  icon-translations:
    status: exempt
    comment: Icons are set via _attr_icon on entity classes; no state-based icon changes.
  reconfigure-flow: done
  repair-issues:
    status: exempt
    comment: >
      All recoverable error states (auth failure, SNMP timeout) are handled
      transparently by the coordinator retry logic and reauth flow without
      requiring user-visible repair issues.
  stale-devices:
    status: exempt
    comment: >
      The integration manages a single device (the firewall itself). Dynamic
      entities (interfaces, VPN tunnels, firewall rules, DHCP servers) reflect
      current firewall configuration; stale entities are removed via
      entity_registry.async_remove() in the coordinator listener whenever a
      previously-seen item disappears from coordinator data.

  # ── Platinum ─────────────────────────────────────────────────────────────
  async-dependency:
    status: todo
    comment: >
      puresnmp 2.x is async-capable but uses blocking plugin discovery on
      import. A custom preload() workaround patches the loader at startup.
      A fully async SNMP library would remove this complexity.
  inject-websession:
    status: exempt
    comment: >
      The XML API client uses its own aiohttp.ClientSession with a bounded
      TCPConnector (limit=2) because the Sophos firewall drops idle Keep-Alive
      connections. Sharing HA's session would reintroduce the stale-socket
      errors this architecture was designed to prevent.
  strict-typing:
    status: done
    comment: >
      SophosData TypedDict defines the coordinator data contract. The
      coordinator class is parametrised as DataUpdateCoordinator[SophosData].
      Remaining Any annotations are limited to raw API response dicts whose
      structure is validated at runtime (XML element-to-dict conversion).
